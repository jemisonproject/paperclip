# Paperclip on a UGREEN NAS, fronted by Tailscale.
#
# Architecture (one Docker stack, two containers sharing a network namespace):
#
#   ┌───────────────────────── one shared netns ─────────────────────────┐
#   │                                                                    │
#   │   tailscale   (joins the koiomi tailnet, terminates HTTPS at :443) │
#   │   paperclip   (listens on :3100, only reachable inside the netns)  │
#   │                                                                    │
#   └────────────────────────────────────────────────────────────────────┘
#                                  │  WireGuard
#                                  ▼
#               https://paperclip.<tailnet>.ts.net
#                  (reachable only to Tailscale members)
#
# We use the official prebuilt image — no local build. Embedded Postgres
# and all Paperclip state live under /paperclip (bind-mounted to ./data/paperclip).
#
# Bring up:    docker compose up -d
# Logs:        docker compose logs -f
# Stop:        docker compose down       (data persists in ./data/)
# Update PC:   docker compose pull paperclip && docker compose up -d
#
# See docs/NAS_DEPLOYMENT.md for the full setup.

services:
  # ----------------------------------------------------------------
  # Tailscale sidecar — joins the tailnet under the tag:paperclip
  # and owns the network namespace that paperclip will share.
  # ----------------------------------------------------------------
  tailscale:
    image: tailscale/tailscale:latest
    container_name: paperclip-tailscale
    hostname: paperclip                  # becomes paperclip.<tailnet>.ts.net
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./data/tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------
  # Paperclip — official image from GHCR. Listens on :3100, all state
  # under /paperclip (volume-mounted). Shares tailscale's netns so it
  # is only reachable through the tailnet hostname.
  # ----------------------------------------------------------------
  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip
    network_mode: "service:tailscale"
    environment:
      - PAPERCLIP_PUBLIC_URL=${PAPERCLIP_PUBLIC_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - PAPERCLIP_DEPLOYMENT_EXPOSURE=private
    volumes:
      - ./data/paperclip:/paperclip
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped
